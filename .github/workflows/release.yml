name: Release

# Publish a GitHub Release whenever a version tag is pushed.
#   git tag v0.1.0-alpha.1 && git push origin v0.1.0-alpha.1
# A tag containing a hyphen (e.g. -alpha, -beta, -rc) is marked as a pre-release.
#
# The windows and linux jobs run in parallel and attach their asset to the SAME
# release, so release creation is idempotent (create-if-missing, then upload --clobber).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the release

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test FinishReplay.sln -c Release --nologo

      # App and worker publish into the SAME folder so MediaWorkerLocator finds the worker
      # (and its bundled FFmpeg native libs) next to the app.
      - name: Publish app
        run: dotnet publish src/FinishReplay/FinishReplay.csproj -c Release -r win-x64 --self-contained true -p:Version=${{ steps.ver.outputs.version }} -o publish

      - name: Publish media worker (embedded FFmpeg)
        run: dotnet publish src/FinishReplay.MediaWorker/FinishReplay.MediaWorker.csproj -c Release -r win-x64 --self-contained true -p:Version=${{ steps.ver.outputs.version }} -o publish

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "FinishReplay-${{ steps.ver.outputs.version }}-win-x64.zip"

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          prerelease=""
          case "$GITHUB_REF_NAME" in *-*) prerelease="--prerelease";; esac
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes $prerelease || true
          gh release upload "$GITHUB_REF_NAME" "FinishReplay-${{ steps.ver.outputs.version }}-win-x64.zip" --clobber

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test FinishReplay.sln -c Release --nologo

      # App and worker publish into the SAME folder so MediaWorkerLocator finds the worker.
      # NOTE: Sdcb.FFmpeg ships no Linux native-libs package, so the worker's in-process codec
      # needs FFmpeg 7 shared libs at runtime (managed-only MJPEG/AVI paths work without them).
      - name: Publish app
        run: dotnet publish src/FinishReplay/FinishReplay.csproj -c Release -r linux-x64 --self-contained true -p:Version=${{ steps.ver.outputs.version }} -o publish

      - name: Publish media worker (embedded FFmpeg)
        run: dotnet publish src/FinishReplay.MediaWorker/FinishReplay.MediaWorker.csproj -c Release -r linux-x64 --self-contained true -p:Version=${{ steps.ver.outputs.version }} -o publish

      - name: Package
        run: tar -czf "FinishReplay-${{ steps.ver.outputs.version }}-linux-x64.tar.gz" -C publish .

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease=""
          case "$GITHUB_REF_NAME" in *-*) prerelease="--prerelease";; esac
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes $prerelease || true
          gh release upload "$GITHUB_REF_NAME" "FinishReplay-${{ steps.ver.outputs.version }}-linux-x64.tar.gz" --clobber
